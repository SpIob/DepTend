name: Ingest

on:
  # Run daily at 04:00 UTC (off-peak for GitHub API)
  schedule:
    - cron: "0 4 * * *"

  # Allow manual trigger for debugging / replay
  workflow_dispatch:
    inputs:
      repo_id:
        description: "Specific repo UUID to ingest (leave blank for all pending)"
        required: false
        type: string

jobs:
  ingest:
    name: Run ingestion job
    runs-on: ubuntu-latest

    # Only run on the main branch (prevents accidental runs from forks)
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @deptend/core build

      - name: Run ingestion
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GH_INGEST_TOKEN }}
        run: |
          if [ -n "${{ inputs.repo_id }}" ]; then
            node scripts/ingest.js --repo-id "${{ inputs.repo_id }}" --triggered-by manual
          else
            node scripts/ingest.js --triggered-by cron
          fi

      - name: Report failure
        if: failure()
        run: echo "Ingestion failed — check logs above. No external alerting in Phase 1."
